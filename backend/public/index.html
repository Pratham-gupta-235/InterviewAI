<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Platform API</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            background-color: #6c757d;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 AI Interview Platform API</h1>
        <p>Your backend server is running successfully and serving static files via Express middleware.</p>

        <div class="status" id="server-status">⏳ Checking Server Status...</div>

        <div class="footer">
            <p>Node.js | Express.js | REST API | AI Powered</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const statusElement = document.getElementById('server-status');
            try {
                const response = await fetch('/health');
                if (response.ok) {
                    const data = await response.json();
                    statusElement.textContent = `🟢 Server Status: Online (${data.status})`;
                    statusElement.style.backgroundColor = '#28a745';
                } else {
                    throw new Error('Server not OK');
                }
            } catch (error) {
                statusElement.textContent = '🔴 Server Status: Offline';
                statusElement.style.backgroundColor = '#dc3545';
            }
        });
    </script>
</body>

</html>
